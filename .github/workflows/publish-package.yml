name: Publish package to NPM

on:
  workflow_dispatch:
    inputs:
      release:
        type: choice
        description: 'Release type (major/minor/patch = stable, alpha/beta = prerelease)'
        default: 'patch'
        options:
          - 'patch'
          - 'minor'
          - 'major'
          - 'alpha'
          - 'beta'
      force:
        type: boolean
        description: 'Force a stable release even if the commits require a higher bump'
        default: false

jobs:
  publish:
    if: github.actor == 'leanderpaul' && github.triggering_actor == 'leanderpaul' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.SHADOW_MANAGER_APP_ID }}
          private-key: ${{ secrets.SHADOW_MANAGER_PRIVATE_KEY }}

      - name: Set up Node.js version
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `shadow release` bumps the chosen level (or cuts an alpha/beta prerelease) and performs every remote
      # git operation (Verified package.json commit on main, tag, GitHub release) through Octokit before
      # publishing to npm. A stable level errors if the commits require a higher bump, unless "force" is checked.
      - name: Release
        run: bun run src/bin/shadow.ts release ${{ github.event.inputs.release }} ${{ github.event.inputs.force == 'true' && '--force' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
